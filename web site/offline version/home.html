<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../master.css">
    <link rel="stylesheet" href="../CSS/Theme.css">
    <link rel="icon" href="../resources/images/icons/logo.png">
    <script src="../JavaScript/Components.js"></script>
    <script src="./offline data.js"></script>
    <title>Home Cinema | Welcome offline</title>
</head>

<body>
    <script>
        function updatefilmlist() {
            let filters = document.getElementsByClassName("filter-checkbox");
            let filters_array = [];
            for (let index = 0; index < filters.length; index++) {
                if (filters[index].checked)
                    filters_array.push(filters[index].value);
            }
            console.log(filters_array)
            let final = offline_research(document.getElementById('research').value, filters_array);
            document.getElementsByClassName('card-group film-list')[0].innerHTML = "";
            cardGroup(final, document.getElementsByClassName('card-group film-list')[0], true, "notState");
        }
        document.body.appendChild(navbar(true, true, true));
        let cercatore = document.getElementById('research');
        cercatore.setAttribute("oninput", "updatefilmlist()");
        cercatore.setAttribute("onsearch", "updatefilmlist()");
        let lente = document.getElementById('research-lens-button');
        lente.setAttribute("onclick", "updatefilmlist()");
        let dice = document.getElementById('random film');
        dice.setAttribute("onclick", "");
    </script>
    <div style="display: flex; flex-direction: row;flex-wrap: wrap; width: 80%;">
        <!-- pulsanti per riordinare lista film dopo la ricerca e etichette per selezionare i generi secondo cui filtrare -->
        <input class="filter-checkbox" type="checkbox" value="guardare" id="filter-guardare" onchange="updatefilmlist()">
        <label for="filter-guardare">ancora da guardare</label>
        <input class="filter-checkbox" type="checkbox" value="visto" id="filter-visto" onchange="updatefilmlist()">
        <label for="filter-visto">già visto ma nulla di chè</label>
        <input class="filter-checkbox" type="checkbox" value="download" id="filter-download" onchange="updatefilmlist()">
        <label for="filter-download">assolutamente da scaricare</label>
        <input class="filter-checkbox" type="checkbox" value="stupendo" id="filter-stupendo" onchange="updatefilmlist()">
        <label for="filter-stupendo">bellismo</label>
    </div>
    <div class="card-group film-list" style="transition: all 1s;">
        <script type="text/javascript">
            let offline_films = get_films(true);
            console.log("result: ");
            console.log(offline_films);
            if (offline_films.length == 0) {
                document.write("<div>there are no films to display</div>");
            } else {
                let result = distinct_keys(["to", "a"], ["g", "s"], offline_films, offline_films.length);
                cardGroup(result, document.getElementsByClassName('card-group film-list')[0], true, "notState");
            }
        </script>
    </div>
    <div>
    </div>
</body>

</html>
